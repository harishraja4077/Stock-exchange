<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Registration | Stackly Exchange Group</title>
    <meta name="description" content="Register an account with Stackly to access live stock trading networks, corporate announcements, and custom holdings portfolios.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 1. Top Scrolling Ticker Bar -->
    <div class="ticker-container">
        <div class="ticker-title">Live Market</div>
        <div class="ticker-wrap">
            <div class="ticker-scroll" id="ticker-scroll-feed">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- 2. Header Navigation -->
    <header>
        <div class="logo-container">
            <a href="index.html">
                <img src="images/logo.webp" alt="Stackly Logo" class="logo-img">
            </a>
        </div>

        <nav>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="services.html">Services</a>
            </div>
            <a href="login.html" class="btn-login">Client Portal</a>
        </nav>

        <div class="mobile-toggle" id="mobile-nav-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <!-- Mobile Drawer Menu -->
    <div class="mobile-nav" id="mobile-menu-drawer">
        <div class="mobile-nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="services.html">Services</a>
            <a href="login.html">Client Portal</a>
        </div>
    </div>

    <!-- 3. Registration Page Container -->
    <main class="register-container">
        <div class="register-card glass-panel glow-hover">
            
            <div class="register-header">
                <h2>Create Account</h2>
                <p>Register as a Retail Investor or Corporate Member</p>
            </div>

            <!-- Registration Progress Steps Indicator -->
            <div class="register-progress-container">
                <div class="register-progress-bar">
                    <div class="register-progress-fill" id="progress-fill-line"></div>
                    <div class="register-step-dot active" id="dot-step-1">1</div>
                    <div class="register-step-dot" id="dot-step-2">2</div>
                    <div class="register-step-dot" id="dot-step-3">3</div>
                </div>
            </div>

            <!-- Multi-step Form submit -->
            <form id="register-form-submit">
                
                <!-- STEP 1: Personal Profile -->
                <div class="register-step-pane active" id="pane-step-1">
                    <div class="form-field">
                        <label for="reg-name">Full Legal Name</label>
                        <input type="text" id="reg-name" class="form-input" placeholder="e.g. Harish Kumar" required>
                    </div>

                    <div class="form-field">
                        <label for="reg-email">Email Address</label>
                        <input type="email" id="reg-email" class="form-input" placeholder="e.g. harish@example.com" required>
                    </div>

                    <div class="form-field">
                        <label for="reg-phone">Mobile Number</label>
                        <input type="tel" id="reg-phone" class="form-input" placeholder="e.g. +91 9876543210" required>
                    </div>

                    <div class="btn-nav-group">
                        <div style="flex:1;"></div>
                        <button type="button" class="btn-submit" id="btn-next-1" style="width: 50%;">
                            <span>Continue to Step 2</span>
                        </button>
                    </div>
                </div>

                <!-- STEP 2: Account Particulars -->
                <div class="register-step-pane" id="pane-step-2">
                    <div class="form-field">
                        <label for="reg-type">Account Selection Type</label>
                        <select id="reg-type" class="form-input" style="background-color:#0d1328; cursor: pointer;">
                            <option value="investor">Retail / Institutional Investor</option>
                            <option value="corporate">Corporate Board Listing Entity</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label for="reg-pan">PAN Card Number / CIN Code</label>
                        <input type="text" id="reg-pan" class="form-input" placeholder="e.g. ABCDE1234F" style="text-transform: uppercase;" required>
                    </div>

                    <div class="form-field">
                        <label for="reg-address">Residential / Corporate Address</label>
                        <input type="text" id="reg-address" class="form-input" placeholder="Address, City, State, ZIP" required>
                    </div>

                    <div class="btn-nav-group">
                        <button type="button" class="btn-prev" id="btn-prev-2">Back</button>
                        <button type="button" class="btn-submit" id="btn-next-2" style="flex: 1.2;">
                            <span>Confirm Identification</span>
                        </button>
                    </div>
                </div>

                <!-- STEP 3: Security & 2FA Setup -->
                <div class="register-step-pane" id="pane-step-3">
                    <div class="form-field">
                        <label for="reg-pass">Secure Portal Password</label>
                        <input type="password" id="reg-pass" class="form-input" placeholder="Min. 6 characters" required minlength="6">
                    </div>

                    <div class="form-field">
                        <label for="reg-pin">6-Digit 2FA Security PIN</label>
                        <input type="password" id="reg-pin" class="form-input" placeholder="e.g. 123456" pattern="\d{6}" maxlength="6" required>
                    </div>

                    <div class="form-options" style="margin-bottom: 20px;">
                        <label class="remember-me">
                            <input type="checkbox" required checked>
                            <span>I agree to Stackly's surveillance disclosures.</span>
                        </label>
                    </div>

                    <div class="btn-nav-group">
                        <button type="button" class="btn-prev" id="btn-prev-3">Back</button>
                        <button type="submit" class="btn-submit" style="flex: 1.2;">
                            <span>Submit Application</span>
                        </button>
                    </div>
                </div>

            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--text-secondary);">
                Already have an account? <a href="login.html" class="forgot-password">Log in here</a>
            </div>

        </div>
    </main>

    

    <script src="js/script.js"></script>
</body>
</html>
